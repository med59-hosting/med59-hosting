name: Generate snake animation

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: med59-hosting
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23A855F7&color_dots=%23161b22,%232d1b3d,%236b21a8,%239333ea,%23a855f7

      - name: Push snake svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
